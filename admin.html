<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>관리자 · 오븐룸 예약</title>
  <link rel="icon" type="image/png" href="img/cookie.png" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="app-header">
    <div class="wrap header-row">
      <div>
        <h1 class="brand">🍪 오븐룸 관리자</h1>
        <p class="subtitle">예약 신청 관리</p>
      </div>
      <a href="#" id="logoutBtn" class="ghost-link">로그아웃</a>
    </div>
  </header>

  <div class="login-gate" id="loginGate" style="display:none;">
    <div class="login-box">
      <h2>관리자 로그인</h2>
      <p class="hint">관리자 토큰을 입력하세요.</p>
      <input type="password" id="tokenInput" placeholder="관리자 토큰" />
      <button class="btn-primary" id="loginBtn">입장</button>
    </div>
  </div>

  <main class="wrap" id="adminApp" style="display:none;">
    <section class="card">
      <div class="filters">
        <label>시작일<br /><input type="date" id="fromDate" /></label>
        <label>종료일<br /><input type="date" id="toDate" /></label>
        <button class="btn-sm" id="reloadBtn">조회</button>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>일시</th><th>예약자</th><th>인원</th><th>구분</th><th>공연명</th><th>입금액</th><th>상태</th><th>관리</th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>
    </section>
  </main>

  <div class="toast" id="toast"></div>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
