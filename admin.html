<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>관리자 · 오븐룸 예약</title>
  <link rel="icon" type="image/png" href="img/cookie.png" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr@4.6.13/dist/flatpickr.min.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="app-header">
    <div class="wrap header-row">
      <div>
        <h1 class="brand">🍪 오븐룸 관리자</h1>
        <p class="subtitle">예약 신청 관리</p>
      </div>
      <div class="header-links" id="headerLinks" style="display:none;">
        <a href="#" id="profileBtn" class="ghost-link">내 정보 변경</a>
        <a href="#" id="logoutBtn" class="ghost-link">로그아웃</a>
      </div>
    </div>
  </header>

  <div class="login-gate" id="loginGate" style="display:none;">
    <div class="login-box">
      <h2>관리자 로그인</h2>
      <p class="hint">아이디와 비밀번호를 입력하세요.</p>
      <input type="text" id="idInput" placeholder="아이디" autocomplete="username" />
      <input type="password" id="pwInput" placeholder="비밀번호" autocomplete="current-password" />
      <button class="btn-primary" id="loginBtn">입장</button>
    </div>
  </div>

  <div class="login-gate modal" id="profileGate" style="display:none;">
    <div class="login-box">
      <h2>내 정보 변경</h2>
      <p class="hint" id="profileHint">바꿀 항목만 입력하세요. 비워두면 그대로 유지됩니다.</p>
      <input type="text" id="npId" placeholder="아이디" autocomplete="off" />
      <input type="text" id="npNick" placeholder="닉네임 (처리자 표시용)" autocomplete="off" />
      <input type="password" id="npPw" placeholder="새 비밀번호 (6자 이상)" autocomplete="new-password" />
      <input type="password" id="npPw2" placeholder="새 비밀번호 확인" autocomplete="new-password" />
      <div class="profile-actions">
        <button class="btn-primary" id="profileSaveBtn">저장</button>
        <button class="btn-sm" id="profileCancelBtn">취소</button>
      </div>
    </div>
  </div>

  <main class="wrap" id="adminApp" style="display:none;">
    <section class="card">
      <details class="filter-panel">
        <summary>검색 상세<span class="fp-now" id="filterNow"></span></summary>
        <div class="filter-body">
          <div class="filter-fields">
            <div class="ff-status">
              <span class="ff-label">상태 (복수 선택 · 모두 해제 = 전체)</span>
              <div class="st-checks">
                <label class="st-item"><input type="checkbox" class="st-check" value="대기" checked /> 대기</label>
                <label class="st-item"><input type="checkbox" class="st-check" value="확정" /> 확정</label>
                <label class="st-item"><input type="checkbox" class="st-check" value="취소" /> 취소</label>
              </div>
            </div>
            <label>시작일
              <input type="text" id="fromDate" placeholder="전체 기간" />
            </label>
            <label>종료일
              <input type="text" id="toDate" placeholder="전체 기간" />
            </label>
          </div>
          <div class="filter-actions">
            <button class="btn-sm" id="reloadBtn">조회</button>
            <button class="btn-sm ghost" id="clearDatesBtn">기간 초기화</button>
          </div>
        </div>
      </details>
    </section>

    <div class="list-bar">
      <span class="list-count" id="listCount"></span>
      <select id="sortSel" class="sort-select" title="정렬">
        <option value="created-asc" selected>신청 빠른순</option>
        <option value="created-desc">신청 늦은순</option>
        <option value="date-asc">사용일 빠른순</option>
        <option value="date-desc">사용일 늦은순</option>
      </select>
    </div>
    <div class="res-cards" id="cardList"></div>
  </main>

  <div class="toast" id="toast"></div>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/flatpickr@4.6.13/dist/flatpickr.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/flatpickr@4.6.13/dist/l10n/ko.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
